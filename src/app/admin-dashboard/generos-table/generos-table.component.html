<ngx-spinner type="ball-scale-multiple"></ngx-spinner>
<section class="container admin-section">
    <div class="row">
        <div class="col-12 col-md-6 order-2 order-md-1">
            <hr class="d-md-none">
            <div class="row">
                <div class="col-12 col-md-6">
                    <input type="text" class="form-control input" placeholder="Filtrar" i18n-placeholder="filtrarGenero" (input)="filtrar($event)" />
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <table class="table table-striped mt-3">
                        <thead>
                            <tr>
                                <th scope="col" i18n="genero genero">Género</th>
                                <th scope="col" i18n="genero verif">Verificado</th>
                                <th scope="col" i18n="genero action">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            @for(genero of generosFiltrados;track genero.id){
                            <tr>
                                <td>{{genero.nombre}}</td>
                                @if(genero.isVerificado){
                                <td>&#x2714;</td>
                                }@else{
                                <td>&#x268A;</td>
                                }
                                <td>
                                    <a class="link-danger p-2" (click)="eliminarGenero(genero.id)"><i
                                            class="bi bi-trash"></i></a>
                                    <a class="link-primary p-2" data-bs-toggle="modal" data-bs-target="#exampleModal" (click)="mostrarGenero(genero)"><i
                                            class="bi bi-pen"></i></a>
                                </td>
                            </tr>
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4 offset-md-2 border-md order-1 order-md-2 my-3 my-md-0" id="mesaTrabajo">
            <h3 i18n="genero new ttl">Crear nuevo Género</h3>
            <form [formGroup]="genero">
                <div class="form-group mb-4">
                    <label for="namegenero" i18n="genero new nombre">Nombre género</label>
                    <input type="text" class="form-control" id="namegenero" formControlName="nombre">
                </div>
                <div class="form-group mb-4">
                    <label i18n="genero new verif">Genero verificado?</label><br>
                    <mat-slide-toggle formControlName="isVerificado"></mat-slide-toggle>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary" (click)="addGenero()" i18n="genero new add btn">Añadir genero</button>
                </div>
            </form>
        </div>
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel" i18n="genero edit ttl">Editar género</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form [formGroup]="generoEdit">
                            <div class="form-group mb-4">
                                <label for="namegenero" i18n="genero edit nombre">Nombre género</label>
                                <input type="text" class="form-control" id="namegenero" formControlName="nombre">
                            </div>
                            <div class="form-group mb-4">
                                <label i18n="genero edit verif">Genero verificado?</label><br>
                                <mat-slide-toggle formControlName="isVerificado"></mat-slide-toggle>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" i18n="genero edit cancel btn">Cancelar</button>
                        <button type="button" class="btn btn-primary" (click)="editarGenero()"  data-bs-dismiss="modal" i18n="genero edit rdit">Editar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
