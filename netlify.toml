[[redirects]]
  from = "/api/backProyectoFinal/public/api*"
  to = "https://books4u-backend-production.up.railway.app/:splat"
  status = 200
  force = true

# Si el código pide /assets/... intenta servirlo desde la carpeta /es
[[redirects]]
  from = "/assets/*"
  to = "/es/assets/:splat"
  status = 200

# Como alternativa para el favicon si falla
[[redirects]]
  from = "/favicon.ico"
  to = "/es/favicon.ico"
  status = 200

# --- SECCIÓN DE IDIOMAS ---

# 1. Si el navegador está en inglés, redirige a /en/
[[redirects]]
  from = "/"
  to = "/en/"
  status = 302
  conditions = {Language = ["en"]}

# 2. Si el navegador está en español (o cualquier otro), redirige a /es/
[[redirects]]
  from = "/"
  to = "/es/"
  status = 302

# --- SECCIÓN SPA (PARA QUE FUNCIONE AL REFRESCAR PÁGINA) ---

# 3. Reglas para que las rutas internas de Angular funcionen
[[redirects]]
  from = "/en/*"
  to = "/en/index.html"
  status = 200

[[redirects]]
  from = "/es/*"
  to = "/es/index.html"
  status = 200

